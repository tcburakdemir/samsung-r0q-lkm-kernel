name: Build S22 r0q Kernel (No KernelSU)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache flex git \
            libncurses-dev libssl-dev libxml2-utils lz4 lzop python3 \
            python3-pip repo unzip zip zstd clang lld llvm libclang-dev \
            libseccomp-dev   # ← Ekledik

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 3G

      - name: Build Kernel
        run: |
          cd kernel_platform
          chmod +x build_kernel_GKI.sh
          ./build_kernel_GKI.sh

      - name: Upload Kernel Output
        uses: actions/upload-artifact@v4
        with:
          name: S22-Kernel-Build-Output
          path: |
            kernel_platform/out/**/*.Image*
            kernel_platform/out/**/*.gz-dtb
            kernel_platform/out/**/*.ko
